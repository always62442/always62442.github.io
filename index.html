<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev.Log | Beige Archive</title>
    <style>
        /* 베이지 & 차분한 톤의 컬러 팔레트 */
        :root {
            --bg-color: #f5f2ed;         /* 부드러운 배경색 */
            --sidebar-bg: #ece7e0;      /* 사이드바 구분 색상 */
            --text-main: #2c2c2c;       /* 텍스트 메인 (완전 검정 지양) */
            --text-muted: #6b7280;      /* 보조 텍스트 */
            --accent: #5b6e58;          /* 포인트 컬러 (올리브 그린/딥 그린) */
            --border: #dcd7cf;          /* 구분선 */
            --card-hover: #ffffff;      /* 카드 호버 시 화이트 포인트 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
            line-height: 1.7;
            display: flex;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        /* 왼쪽 프로필 영역 */
        .sidebar {
            background-color: var(--sidebar-bg);
            padding: 60px 40px;
            border-right: 1px solid var(--border);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            background-color: #dfd8cf;
            border: 2px solid var(--accent);
            border-radius: 50%; /* 베이지톤은 원형 프로필이 더 부드러워 보입니다 */
            margin-bottom: 24px;
        }
